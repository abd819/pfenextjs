components:
  schemas:
    CustomTokenObtainPair:
      type: object
      properties:
        phone:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - phone
    DispatchStateEnum:
      enum:
      - pending
      - offered
      - accepted
      - expired
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `offered` - Offered
        * `accepted` - Accepted
        * `expired` - Expired
        * `cancelled` - Cancelled
    PatchedProviderProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        provider:
          type: integer
          readOnly: true
        provider_first_name:
          type: string
          readOnly: true
        provider_last_name:
          type: string
          readOnly: true
        provider_phone:
          type: string
          readOnly: true
        is_available:
          type: boolean
        average_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          readOnly: true
        total_reviews:
          type: integer
          readOnly: true
        service_zone:
          type: string
          maxLength: 255
    PatchedReview:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        request:
          type: integer
        driver:
          type: integer
          readOnly: true
        provider:
          type: integer
          readOnly: true
        rating:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        comment:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/ReviewStatusEnum'
          readOnly: true
        response:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        response_date:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        driver_first_name:
          type: string
          readOnly: true
        driver_last_name:
          type: string
          readOnly: true
    PatchedVehicle:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        driver:
          type: integer
          readOnly: true
        brand:
          type: string
          maxLength: 100
        model_name:
          type: string
          maxLength: 100
        year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        registration_number:
          type: string
          maxLength: 50
        color:
          type: string
          maxLength: 50
        vehicle_type:
          type: string
          maxLength: 100
        display_name:
          type: string
          readOnly: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/VehicleImage'
          readOnly: true
        uploaded_images:
          type: array
          items:
            type: string
            format: uri
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    ProviderProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        provider:
          type: integer
          readOnly: true
        provider_first_name:
          type: string
          readOnly: true
        provider_last_name:
          type: string
          readOnly: true
        provider_phone:
          type: string
          readOnly: true
        is_available:
          type: boolean
        average_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          readOnly: true
        total_reviews:
          type: integer
          readOnly: true
        service_zone:
          type: string
          maxLength: 255
      required:
      - average_rating
      - id
      - provider
      - provider_first_name
      - provider_last_name
      - provider_phone
      - total_reviews
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        password:
          type: string
          writeOnly: true
        password_confirmation:
          type: string
          writeOnly: true
        date_creation:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_creation
      - first_name
      - id
      - last_name
      - password
      - password_confirmation
      - phone
      - role
    Review:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        request:
          type: integer
        driver:
          type: integer
          readOnly: true
        provider:
          type: integer
          readOnly: true
        rating:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        comment:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/ReviewStatusEnum'
          readOnly: true
        response:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        response_date:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        driver_first_name:
          type: string
          readOnly: true
        driver_last_name:
          type: string
          readOnly: true
      required:
      - comment
      - created_at
      - driver
      - driver_first_name
      - driver_last_name
      - id
      - provider
      - rating
      - request
      - response_date
      - status
    ReviewStatusEnum:
      enum:
      - published
      - hidden
      type: string
      description: |-
        * `published` - Published
        * `hidden` - Hidden
    RoleEnum:
      enum:
      - driver
      - provider
      type: string
      description: |-
        * `driver` - Driver
        * `provider` - Provider
    ServiceRequestCreate:
